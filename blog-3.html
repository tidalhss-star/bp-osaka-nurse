        :root {
            --bg: #FDFAF6;
            --ink: #1C1C1C;

            --gold: #C8A27A;
            --gold-light: rgba(200, 162, 122, 0.15);

        }

            border-bottom: 1px solid var(--border);
            height: var(--header-height);
            display: flex;
            align-items: center;
        }

        .header-inner {
            max-width: var(--max-width);

            align-items: center;
            justify-content: space-between;
        }

            display: flex;

            gap: 10px;
            text-decoration: none;
            color: var(--ink);
        }

            height: 34px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            flex-shrink: 0;
        }

        .site-branding span {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            white-space: nowrap;
        }

        /* ─── Nav ──────────────────────────── */
        .main-nav {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }

        .main-nav a {
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--ink);
            padding: 6px 2px;
            border-bottom: 2px solid transparent;
            transition: border-color var(--transition), color var(--transition);
            white-space: nowrap;
        }

        .main-nav a:hover,
        .main-nav a.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }

        .hamburger-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--ink);
            line-height: 1;
            padding: 4px;
        }

        /* ─── Page Content ──────────────────── */
        .page-content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 48px 24px 80px;

            display: inline-block;

            background: var(--accent-subtle);
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 16px;
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.03em;
            margin-bottom: 16px;

            max-width: 640px;
            line-height: 1.6;
            margin-bottom: 48px;
        }

        /* ─── Trend Grid ────────────────────── */
        .trend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 56px;
        }

        .trend-card {
            background: var(--bg-card);

            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition), transform var(--transition);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .trend-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

            color: #FDFAF6;
            font-size: 0.9rem;
            font-family: var(--font-sans);

        }

        .newsletter-form input::placeholder {
            color: #8A8A8A;
        }

        .newsletter-form input:focus {
            border-color: var(--gold);
        }

        .newsletter-form button {
            flex: 0 0 auto;
            padding: 12px 24px;
            border-radius: 100px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: background var(--transition);
        }

        .newsletter-form button:hover {
            background: #A14545;
        }

        /* ─── Tel Link ──────────────────────── */
        .tel-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1.5px solid transparent;
            transition: border-color var(--transition);
        }

        .tel-link:hover {
            border-bottom-color: var(--accent);
        }

        /* ─── Footer ───────────────────────── */
        .site-footer {
            border-top: 1px solid var(--border);
            padding: 32px 24px;
            text-align: center;
            font-size: 0.8rem;
            color: #8A8A8A;
            max-width: var(--max-width);
            margin: 0 auto;
        }

            color: var(--ink);
            text-decoration: none;
            font-weight: 500;
        }

        /* ─── Responsive ───────────────────── */

                top: var(--header-height);
